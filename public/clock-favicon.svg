<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Clock circle -->
  <circle cx="50" cy="50" r="45" fill="#1e293b" stroke="#0ea5e9" stroke-width="4"/>
  <!-- Hour markers -->
  <line x1="50" y1="12" x2="50" y2="20" stroke="#e2e8f0" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="80" x2="50" y2="88" stroke="#e2e8f0" stroke-width="3" stroke-linecap="round"/>
  <line x1="12" y1="50" x2="20" y2="50" stroke="#e2e8f0" stroke-width="3" stroke-linecap="round"/>
  <line x1="80" y1="50" x2="88" y2="50" stroke="#e2e8f0" stroke-width="3" stroke-linecap="round"/>
  <!-- Clock hands -->
  <!-- Hour hand -->
  <line x1="50" y1="50" x2="50" y2="35" stroke="#0ea5e9" stroke-width="5" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="50" y1="50" x2="65" y2="50" stroke="#e2e8f0" stroke-width="3" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="50" cy="50" r="4" fill="#0ea5e9"/>
</svg>